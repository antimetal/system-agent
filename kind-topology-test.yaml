# KIND cluster configuration for topology testing
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: antimetal-topology-test
nodes:
- role: control-plane
  extraMounts:
  # Mount host /proc, /sys, /dev for real system access
  - hostPath: /proc
    containerPath: /host/proc
    readOnly: true
  - hostPath: /sys
    containerPath: /host/sys
    readOnly: true
  - hostPath: /dev
    containerPath: /host/dev
    readOnly: true
  # Mount container runtime paths for container discovery
  - hostPath: /var/lib/docker
    containerPath: /host/var/lib/docker
    readOnly: true
  - hostPath: /run/containerd
    containerPath: /host/run/containerd
    readOnly: true
  - hostPath: /var/run/docker.sock
    containerPath: /var/run/docker.sock
    readOnly: true
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        # Enable cgroup v2 support
        cgroup-driver: systemd
        # Enable container runtime endpoint
        container-runtime-endpoint: unix:///run/containerd/containerd.sock
- role: worker
  extraMounts:
  - hostPath: /proc
    containerPath: /host/proc
    readOnly: true
  - hostPath: /sys
    containerPath: /host/sys
    readOnly: true
  - hostPath: /dev
    containerPath: /host/dev
    readOnly: true
  - hostPath: /var/lib/docker
    containerPath: /host/var/lib/docker
    readOnly: true
  - hostPath: /run/containerd
    containerPath: /host/run/containerd
    readOnly: true
  - hostPath: /var/run/docker.sock
    containerPath: /var/run/docker.sock
    readOnly: true